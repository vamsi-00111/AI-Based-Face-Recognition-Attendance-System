<!DOCTYPE html>
<html>

<head>
<title>Face Recognition Attendance</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Face Recognition Attendance System</h1>

<!-- Register Student -->

<div class="card">

<h2>Register Student</h2>

<input type="text" id="student_id" placeholder="Student ID">

<br><br>

<input type="text" id="name" placeholder="Student Name">

<br><br>

<input type="file" id="image">

<br><br>

<button onclick="register()">Register Student</button>

</div>


<!-- Browser Camera Attendance -->

<div class="card">

<h2>Start Attendance (Browser Camera)</h2>
<button onclick="startCamera()">Start Camera</button>
<button onclick="stopCamera()">Stop Camera</button>

<br><br>

<div class="camera-box" style="position:relative; width:480px; height:320px;">

<video id="video"
width="480"
height="320"
autoplay
playsinline
muted
style="position:absolute; top:0; left:0;">
</video>

<canvas id="canvas"
width="480"
height="320"
style="position:absolute; top:0; left:0;">
</canvas>

</div>

<br>

<p id="detected">Camera not started</p>

</div>


<!-- Attendance By Date -->

<div class="card">

<h2>Check Attendance By Date</h2>

<input type="date" id="date">

<br><br>

<button onclick="getAttendance()">Check Attendance</button>

<div id="attendance_result"></div>

</div>


<!-- Total Attendance -->

<div class="card">

<h2>Total Attendance of Student</h2>

<input type="text" id="student_search" placeholder="Student ID">

<br><br>

<button onclick="totalAttendance()">Check Total</button>

<div id="total_result"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
